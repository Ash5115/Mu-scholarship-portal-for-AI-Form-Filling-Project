{% extends "base.html" %}

{% block content %}

<h2>Step 2: Academic Details</h2>

<form method="POST">

    <label>College Name</label><br>
    <input type="text" name="college_name" required><br><br>

    <label>Enrollment Number</label><br>
    <input type="text" name="enrollment_no" required><br><br>

    <label>Course Name</label><br>
    <input type="text" name="course_name" required><br><br>

    <label>Year of Study</label><br>
    <select name="study_year" required>
        <option value="">Select</option>
        <option>First</option>
        <option>Second</option>
        <option>Third</option>
        <option>Fourth</option>
    </select><br><br>

    <label>Percentage</label><br>
    <input type="number" name="last_percentage" required><br><br>

    <button type="submit" class="btn">Next</button>

</form>

{% endblock %}
